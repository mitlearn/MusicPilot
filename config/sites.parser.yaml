sites:
  - targets:
      - name: M-Team
        base_url: https://kp.m-team.cc
    adapter: mteam
  - targets:
      - name: OpenCD
        base_url: https://open.cd
      - name: HDFans
        base_url: https://hdfans.org/
      - name: CarPT
        base_url: https://carpt.net/
      - name: ZMPT
        base_url: https://zmpt.cc/
      - name: Musopia
        base_url: https://www.musopia.vip/
    adapter: nexusphp
    parser:
      list_selector: "table.torrents tr:has(a[href*='details.php']):has(a[href*='download.php'])"
      fields:
        type:
          selector: "td:nth-of-type(1)"
          attribute: "titles"
          filters: ["category"]
        title:
          selector: "a[href*='details.php']"
          filters: ["collapse_space"]
        subtitle:
          selector: "td:nth-of-type(2) .subtitle, td:nth-of-type(2) .embedded, td:nth-of-type(2) > span, td:nth-of-type(2)"
          attribute: "text"
          filters: ["collapse_space"]
        details:
          selector: "a[href*='details.php']"
          attribute: "href"
        download:
          selector: "a[href*='download.php']"
          attribute: "href"
        size:
          selector: "td"
          attribute: "text+attrs"
          regex: "(\\d+(?:\\.\\d+)?\\s*(?:[KMGT]i?B|[KMGT]B))"
        published_at:
          selector: "time, td, span, font"
          attribute: "text+attrs"
          filters: ["date"]
        promotion:
          selector: "img, font, span, td"
          attribute: "text+attrs"
          filters: ["promotion"]
        seeders:
          selector: ":scope > td:nth-last-of-type(4)"
        leechers:
          selector: ":scope > td:nth-last-of-type(3)"
      filter:
        type:
          include:
            - music
            - HQ / Audio
  - targets:
      - name: JPopSuki
        base_url: https://jpopsuki.eu/
    adapter: nexusphp
    parser:
      search_path: ajax.php
      search_query_param: searchstr
      search_params:
        section: torrents
        disablegrouping: "1"
        action: basic
        searchtags: ""
        tags_type: "0"
        order_by: s3
        order_way: desc
        "filter_cat[1]": "1"
        "filter_cat[2]": "1"
      list_selector: "table#torrent_table tr[class^='torrent']:has(a[title='Download'])"
      fields:
        type:
          selector: "td:first-child"
          filters: ["collapse_space"]
        title:
          selector: "td:nth-last-child(7)"
          remove:
            - span
            - div.tags
            - "a[title='View Comments']"
          filters: ["collapse_space"]
          regex: '^(.*?)\s*(?:\(\s*\))?$'
        subtitle:
          selector: "div.tags"
          filters: ["collapse_space"]
        details:
          selector: "a[href^='torrents.php?id=']"
          attribute: href
        download:
          selector: "a[title='Download'][href^='torrents.php?action=download']"
          attribute: href
        size:
          selector: "td:nth-last-child(4)"
          filters: ["collapse_space"]
        published_at:
          selector: "td:nth-last-child(5)"
          attribute: title
        promotion:
          selector: strong
          filters: ["promotion"]
        seeders:
          selector: "td:nth-last-child(2)"
        leechers:
          selector: "td:nth-last-child(1)"
  - targets:
      - name: HHClub
        base_url: https://hhanclub.net/
      - name: HHClub
        base_url: https://hhan.club/
      - name: HHClub
        base_url: https://hhanclub.top/
    adapter: nexusphp
    parser:
      search_params:
        search-mode: "0"
        incldead: "1"
        spstate: "0"
        inclbookmarked: "0"
        search_area: "0"
        search_all: "1"
      list_selector: "div.torrent-table-sub-info:has(a[href^='details.php?id=']), div.w-full:has(a[href^='details.php?id='])"
      fields:
        type:
          selector: "a[href*='cat[]=']"
          attribute: "text+attrs"
          filters: ["category"]
        title:
          selector: ".torrent-title a[href^='details.php?id='], a[href^='details.php?id=']"
          filters: ["collapse_space"]
        subtitle:
          selector: ".torrent-title .torrent-info-text-small-name, .torrent-title > div > div"
          filters: ["collapse_space"]
        details:
          selector: "a[href^='details.php?id=']"
          attribute: "href"
        download:
          selector: "a[href^='download.php?id=']"
          attribute: "href"
        size:
          selector: ".torrent-info-text-size, div.torrent-info-text:nth-child(1)"
          filters: ["collapse_space"]
        published_at:
          selector: ".torrent-info-text-added, div.torrent-info-text:nth-child(2)"
          attribute: "text+attrs"
          filters: ["date"]
        promotion:
          selector: "span[class*='promotion-tag']"
          attribute: "class"
          filters: ["promotion"]
        seeders:
          selector: ".torrent-info-text-seeders, div.torrent-info-text:nth-child(3)"
        leechers:
          selector: ".torrent-info-text-leechers, div.torrent-info-text:nth-child(4)"
      filter:
        type:
          include:
            - music
